# runs on every push and pull request targeting main
# fails if any test breaks, keeping the main branch green
name: Run Tests

on:
  push:
    branches: [main] # run workflow only when pushing to main branch
  pull_request:
    branches: [main] # also run on Pull Requests targeting main, before merge

jobs:
  test:
    runs-on: ubuntu-latest # use latest Ubuntu runner

    steps:
      - uses: actions/checkout@v4 # check out repository code

      - uses: actions/setup-node@v4 # set up Node.js environment
        with:
          node-version: 22 # use Node.js version 22 (my current version!)

      - run: npm ci # install dependencies in clean CI mode
      - run: npm run lint # fail the build on lint errors
      - run: npm audit --audit-level=high # fail on high/critical dependency vulnerabilities
      - run: npm test # run test suite

